<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinyl Vibes - Login</title>
<link rel="stylesheet" href="../style.css">
<script src="script.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    font-family:'Roboto',sans-serif;
    margin:0;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=1740&q=80') center/cover no-repeat;
    color:#fff;
}

header {
    display:flex; justify-content:space-between; align-items:center;
    padding:20px 50px; background:rgba(0,0,0,0.7);
}

header .logo h1 { font-family:'Pacifico',cursive; color:#ff4081; }

nav ul { list-style:none; display:flex; gap:30px; }

nav a { color:#fff; text-decoration:none; font-weight:bold; }

nav a:hover { color:#00e5ff; }

h2 {
    text-align:center;
    margin:50px 0;
    font-family:'Pacifico',cursive;
    color:#ff4081;
}

.login-container {
    max-width:400px;
    margin:50px auto;
    background: rgba(255,255,255,0.05);
    padding:30px;
    border-radius:15px;
    text-align:center;
}

.login-container input {
    width:80%;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    border:none;
}

.login-container button {
    padding:10px 30px;
    margin-top:10px;
    background: linear-gradient(45deg,#ff4081,#00e5ff);
    color:#fff;
    border:none;
    border-radius:50px;
    cursor:pointer;
    font-weight:bold;
}

.login-container button:hover {
    transform:scale(1.05);
}
</style>
</head>

<body>

<header>
  <div class="logo"><h1>Vinyl Vibes</h1></div>
</header>

<h2>Login to Vinyl Vibes</h2>

<div class="login-container">
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="loginMsg"></p>
    <p>Don't have an account? <a href="register.html" style="color:#00e5ff;">Register</a></p>
</div>

<script>
function login(){
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const msg = document.getElementById('loginMsg');

    let users = JSON.parse(localStorage.getItem('users')) || [];

    let user = users.find(u => u.username === username && u.password === password);

    if(user){
        localStorage.setItem('loggedInUser', username);

        msg.style.color = "lightgreen";
        msg.textContent = "Login successful! Redirecting...";

        setTimeout(()=>{
            window.location.href = "index.html";
        },1500);
    } else {
        msg.style.color = "red";
        msg.textContent = "Invalid username or password!";
    }
}
</script>

</body>
</html>
