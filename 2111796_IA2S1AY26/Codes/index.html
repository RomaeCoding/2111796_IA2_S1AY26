<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinyl Vibes - Home</title>
    <link rel="stylesheet" href="../style.css">
    <script src="../script.js" defer></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=1740&q=80') no-repeat center center/cover;
            color: #fff;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(0,0,0,0.7);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 50%;
        }

        header .logo h1 {
            font-family: 'Pacifico', cursive;
            font-size: 2.5rem;
            color: #ff4081;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        nav ul li a {
            text-decoration: none;
            color: #fff;
            font-weight: 700;
            transition: 0.3s;
        }

        nav ul li a:hover {
            color: #00e5ff;
        }

        .hero {
            text-align: center;
            padding: 150px 20px 100px 20px;
        }

        .hero h2 {
            font-family: 'Pacifico', cursive;
            font-size: 3rem;
            margin-bottom: 20px;
            color: #ffeb3b;
            text-shadow: 2px 2px #000;
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #fff;
        }

        .btn {
            text-decoration: none;
            padding: 15px 35px;
            background: linear-gradient(45deg, #ff4081, #00e5ff);
            color: #fff;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.4s;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px #ff4081, 0 0 15px #00e5ff;
        }

        .genres {
            padding: 100px 50px;
            text-align: center;
        }

        .genres h2 {
            font-family: 'Pacifico', cursive;
            font-size: 2.5rem;
            margin-bottom: 50px;
            color: #ff4081;
        }

        .genre-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
            width: 250px;
            transition: transform 0.5s, box-shadow 0.5s;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.7);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .card img:hover {
            transform: scale(1.1);
        }

        .card h3 {
            padding: 15px;
            color: #fff;
            font-family: 'Pacifico', cursive;
            font-size: 1.5rem;
        }

        footer {
            text-align: center;
            padding: 30px 0;
            background: rgba(0,0,0,0.7);
            color: #fff;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <header>
        <div class="logo">
       
            <img src="https://img.freepik.com/premium-photo/beautiful-record-album-clipart-illustration_962764-28422.jpg?w=1480" alt="Vinyl Vibes Logo">
            <h1>Vinyl Vibes</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Discover the Magic of Vinyls</h2>
        <p>Pop, Latin, K-pop & R&B – Feel the music in its purest form.</p>
        <a href="products.html" class="btn">Shop Now</a>
    </section>

    <!-- Genres Preview -->
    <section class="genres">
        <h2>Explore by Genre</h2>
        <div class="genre-cards">
            <div class="card">
                <img src="https://media.istockphoto.com/id/1158250497/photo/silhouette-of-singer-on-stage-dark-background-smoke-spotlights.jpg?s=170667a&w=0&k=20&c=n0_eL8JR2U-5WnWPWlGOXCJPdrbPtAX2V3k3bajqIPk=" alt="Pop Vinyl">
                <h3>Pop</h3>
            </div>
            <div class="card">
                <img src="https://i8.amplience.net/i/naras/Latin-Music-Festival-Collage_IG-1644x925" alt="Latin Vinyl">
                <h3>Latin</h3>
            </div>
            <div class="card">
                <img src="https://wallpapercave.com/wp/wp9671596.jpg" alt="K-pop Vinyl">
                <h3>K-pop</h3>
            </div>
            <div class="card">
                <img src="https://img.freepik.com/premium-photo/joyful-singer-stage-performance_38187-9061.jpg" alt="R&B Vinyl">
                <h3>R&B</h3>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Vinyl Vibes. All rights reserved.</p>
    </footer>
</body>
</html>
